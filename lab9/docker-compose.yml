services:
  web:
    image: nginx:alpine
    container_name: lab9-web
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - app
    networks:
      - lab9-net

  app:
    build:
      context: ./app
    container_name: lab9-app
    environment:
      - PORT=3000
      - REDIS_HOST=cache
      - REDIS_PORT=6379
    ports:
      - "3000:3000"
    depends_on:
      - cache
    networks:
      - lab9-net

  cache:
    image: redis:7-alpine
    container_name: lab9-cache
    ports:
      - "6379:6379"
    networks:
      - lab9-net

networks:
  lab9-net:
    driver: bridge
